- defaults:
    link:
      create: true
      relink: true

- clean:
    ~/:
    ~/.config:
      recursive: true

- link:
    # Git
    ~/.gitconfig: config/git/.gitconfig
    ~/.gitignore: config/git/.gitignore
    ~/.config/git/work.gitconfig:
      ignore-missing: true
      path: config/git/work.gitconfig

    # Oh My Posh themes
    ~/default.omp.json: config/omp-themes/default.omp.json

    # ZSH
    ~/.config/zsh/.aliases: config/zsh/.aliases
    ~/.config/zsh/.functions: config/zsh/.functions
    ~/.config/zsh/.env-variables:
      ignore-missing: true
      path: config/zsh/.env-variables
    ~/.zshrc: config/zsh/.zshrc

    # Powershell
    ~/.config/powershell:
      glob: true
      path: config/posh/**

    # Kitty
    ~/.config/kitty/kitty.conf: config/kitty/kitty.conf

    # NeoVim
    ~/.config/nvim:
      glob: true
      path: config/nvim/**

    # Brewfile
    ~/.Brewfile:
      if: '[ "$(uname)" = Darwin ] || [ "$(uname)" = Linux ]'
      path: config/brew/.Brewfile

    ~/.Brewfile-$PROFILE:
      if: '[ "$(uname)" = Darwin ] || [ "$(uname)" = Linux ]'
      path: config/brew/.Brewfile-$PROFILE
      ignore-missing: true

    # Claude Code
    ~/.claude/settings.json: config/claude/settings.json
    ~/.claude/CLAUDE.md:
      ignore-missing: true
      path: config/claude/CLAUDE.md
    ~/.claude/agents:
      ignore-missing: true
      path: config/claude/agents
    ~/.claude/hooks:
      ignore-missing: true
      path: config/claude/hooks
    ~/.claude/rules:
      ignore-missing: true
      path: config/claude/rules
    ~/.claude/skills: config/skills/skills

    # Cline
    ~/.cline/skills: config/skills/skills

    # Atuin
    ~/.config/atuin/config.toml: config/atuin/config.toml

    # Apps
    # ~/.hammerspoon: applications/.hammerspoon
    # ~/.zazurc.json: applications/.zazurc.json

    # Linters
    # ~/.eslintrc: linters/.eslintrc

- shell:
  - [git submodule update --init --recursive, Installing submodules]

  - description: Installing Homebrew packages
    command: bash ./scripts/install-brew-packages.sh
    stdin: true
    stdout: true
