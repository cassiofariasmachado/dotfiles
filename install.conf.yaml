- defaults:
    link:
      create: true
      relink: true

- clean:
    ~/:
    ~/.config:
      recursive: true

- link:
    # Git
    ~/.gitconfig: config/git/.gitconfig
    ~/.gitignore: config/git/.gitignore
    ~/.config/git/work.gitconfig:
      ignore-missing: true
      path: config/git/work.gitconfig

    # Oh My Posh themes
    ~/default.omp.json: config/omp-themes/default.omp.json

    # ZSH
    ~/.config/zsh/.aliases: config/zsh/.aliases
    ~/.config/zsh/.functions: config/zsh/.functions
    ~/.config/zsh/.env-variables:
      ignore-missing: true
      path: config/zsh/.env-variables
    ~/.zshrc: config/zsh/.zshrc

    # Powershell
    ~/.config/powershell:
      glob: true
      path: config/posh/**

    # Kitty
    ~/.config/kitty/kitty.conf: config/kitty/kitty.conf

    # NeoVim
    ~/.config/nvim:
      glob: true
      path: config/nvim/**

    # Brewfile
    ~/.Brewfile:
      path: config/brew/.Brewfile

    ~/.Brewfile-$PROFILE:
      path: config/brew/.Brewfile-$PROFILE
      if: "$PROFILE != ''"

    # Apps
    # ~/.hammerspoon: applications/.hammerspoon
    # ~/.zazurc.json: applications/.zazurc.json

    # Linters
    # ~/.eslintrc: linters/.eslintrc

- shell:
  - [git submodule update --init --recursive, Installing submodules]

  - description: Installing Homebrew packages (default)
    command: "[ -s $HOME/.Brewfile ] && echo \"brew bundle --file ~/.Brewfile\""
    stdin: false
    stdout: true
    quiet: true

  - description: Installing Homebrew packages (profile)
    command: "[ -n \"$PROFILE\" ] && [ -s \"$HOME/.Brewfile-$PROFILE\" ] && echo \"brew bundle --file $HOME/.Brewfile-$PROFILE\""
    stdin: false
    stdout: true
    quiet: true